services:
  app:
    build:
      context: ..
    container_name: app
    environment:
      - PORT=3000
    ports:
      - "3000:3000"
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    environment:
      # Prometheus config uses ${ALB_DNS_NAME}; default to local app container.
      - ALB_DNS_NAME=app:3000
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
