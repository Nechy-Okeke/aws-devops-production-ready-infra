global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "node_app"
    metrics_path: /metrics
    scheme: http
    # For local runs (docker-compose), docker-compose will set ALB_DNS_NAME=app:3000 by default.
    # For AWS/ECS, set ALB_DNS_NAME to your ALB DNS name and keep this compose file out of the pipeline.
    static_configs:
      - targets: ["${ALB_DNS_NAME}:80"]
