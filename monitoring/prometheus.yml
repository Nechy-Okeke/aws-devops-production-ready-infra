global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "node_app"
    metrics_path: /metrics
    scheme: http
    # For local runs (docker-compose), target the app container name `app`.
    # For AWS/ECS, update this file (or use a different mechanism) to scrape
    # the ALB DNS name if you expose /metrics via the listener.
    static_configs:
      - targets: ["app:3000"]
