name: deploy

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'metrics-health-service' }}
  ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME || 'metrics-health-service' }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME || 'metrics-health-service' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint
        working-directory: app
        run: |
          npm ci || npm install
          npm run lint || true

      - name: Test (basic smoke)
        working-directory: app
        run: |
          npm ci || npm install
          # Start the app in background so npm test can hit /health
          npm run start --silent &
          APP_PID=$!
          # Wait for server to bind
          for i in {1..30}; do
            node -e "require('http').get('http://127.0.0.1:3000/health', (r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))" && break
            sleep 1
          done
          npm test
          kill $APP_PID

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # Bootstrap Terraform backend state locking resources (S3 + DynamoDB)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Terraform backend bootstrap
        working-directory: terraform/bootstrap
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ secrets.PROJECT_NAME || 'metrics-health' }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: aws-devops-production-ready-infra-app
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: aws-devops-production-ready-infra-app
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  terraform-plan:
    runs-on: ubuntu-latest
    needs: [build]
    outputs:
      tfplan_artifact: ${{ steps.plan_meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # (Kept terraform installation here to support `terraform validate/plan` steps)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TERRAFORM_LOCK_TABLE }}
          TF_REGION: ${{ secrets.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=terraform/terraform.tfstate" \
            -backend-config="region=${TF_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        id: plan_meta
        working-directory: terraform
        env:
          TF_VAR_project_name: "aws-devops-production-ready-infra"
          TF_VAR_ecr_image_tag: ${{ needs.build.outputs.image_tag }}
          TF_VAR_container_port: 3000
          TF_VAR_alb_listener_port: 80
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_acm_certificate_domain_name: ${{ secrets.ACM_CERT_DOMAIN_NAME }}
        run: |
          ARTIFACT_NAME="tfplan-${{ github.sha }}"
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          terraform plan -out="${ARTIFACT_NAME}.out"

      - name: Upload terraform plan artifact
        working-directory: terraform
        env:
          ARTIFACT_NAME: tfplan-${{ github.sha }}
        run: |
          ls -la
          tar -czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}.out"
      - name: Upload plan (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan-${{ github.sha }}.tar.gz
          if-no-files-found: error

  terraform-apply:
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/

      - name: Unpack plan
        working-directory: terraform
        run: |
          tar -xzf tfplan-${{ github.sha }}.tar.gz

      - name: Terraform init
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TERRAFORM_LOCK_TABLE }}
          TF_REGION: ${{ secrets.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=terraform/terraform.tfstate" \
            -backend-config="region=${TF_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_project_name: "aws-devops-production-ready-infra"
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: |
          terraform apply -auto-approve "${{ format('tfplan-{0}.out', github.sha) }}"
