name: deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: terraform-prod-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  # Keep existing env vars, but ensure terraform uses correct project name & ECR repo below.
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'metrics-health-app' }}
  ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME || 'metrics-health-service' }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME || 'metrics-health-service' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint
        working-directory: app
        run: |
          npm ci || npm install
          npm run lint || true

      - name: Test (basic smoke)
        working-directory: app
        run: |
          npm ci || npm install
          # Start the app in background so npm test can hit /health
          npm run start --silent &
          APP_PID=$!
          # Wait for server to bind
          for i in {1..30}; do
            node -e "require('http').get('http://127.0.0.1:3000/health', (r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))" && break
            sleep 1
          done
          npm test
          kill $APP_PID

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::669890779296:role/github-actions-oidc
          aws-region: us-east-1

      # Bootstrap Terraform backend state locking resources (S3 + DynamoDB)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Terraform backend bootstrap
        working-directory: terraform/bootstrap
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ secrets.PROJECT_NAME || 'metrics-health' }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Create ECR repository if it doesn't exist
        env:
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          AWS_REGION: us-east-1
        run: |
          set -euo pipefail
          echo "Ensuring ECR repo exists: ${ECR_REPOSITORY} (region: ${AWS_REGION})"
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION"

      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          export DOCKER_CLI_EXPERIMENTAL=enabled
          echo "Pushing images to: $ECR_REGISTRY/$ECR_REPOSITORY"

          # Retry pushes to avoid rare hangs/timeouts.
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3: push tag ${IMAGE_TAG}"
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG && break
            if [ "${attempt}" = "3" ]; then exit 1; fi
            sleep 10
          done

          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3: push tag latest"
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest && break
            if [ "${attempt}" = "3" ]; then exit 1; fi
            sleep 10
          done

  terraform-plan:
    runs-on: ubuntu-latest
    needs: [build]
    outputs:
      tfplan_artifact: ${{ steps.plan_meta.outputs.artifact_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::669890779296:role/github-actions-oidc
          aws-region: us-east-1

      # (Kept terraform installation here to support `terraform validate/plan` steps)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Ensure Terraform backend exists (S3 + DynamoDB)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail

          echo "Checking S3 bucket: ${TF_STATE_BUCKET} in region: ${TF_REGION}"
          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" --region "${TF_REGION}" 2>/dev/null; then
            echo "S3 bucket exists"
          else
            echo "S3 bucket missing; creating..."
            if [ "${TF_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET}" --region "${TF_REGION}"
            else
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET}" --region "${TF_REGION}" --create-bucket-configuration LocationConstraint="${TF_REGION}"
            fi
            aws s3api wait bucket-exists --bucket "${TF_STATE_BUCKET}" --region "${TF_REGION}"
          fi

          echo "Checking DynamoDB lock table: ${TF_LOCK_TABLE}"
          if aws dynamodb describe-table --table-name "${TF_LOCK_TABLE}" --region "${TF_REGION}" >/dev/null 2>&1; then
            echo "DynamoDB table exists"
          else
            echo "DynamoDB table missing; creating..."
            aws dynamodb create-table \
              --table-name "${TF_LOCK_TABLE}" \
              --region "${TF_REGION}" \
              --billing-mode PAY_PER_REQUEST \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH
            aws dynamodb wait table-exists --table-name "${TF_LOCK_TABLE}" --region "${TF_REGION}"
          fi

      - name: Terraform init
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_REGION: ${{ secrets.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=terraform/terraform.tfstate" \
            -backend-config="region=${TF_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        id: plan_meta
        working-directory: terraform
        env:
          TF_VAR_project_name: "aws-devops-production-ready-infra"
          TF_VAR_ecr_image_tag: ${{ needs.build.outputs.image_tag }}
          TF_VAR_container_port: 3000
          TF_VAR_alb_listener_port: 80
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_acm_certificate_domain_name: ${{ secrets.ACM_CERT_DOMAIN_NAME }}
        run: |
          ARTIFACT_NAME="tfplan-${{ github.sha }}"
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          terraform plan -out="${ARTIFACT_NAME}.out"

      - name: Upload terraform plan artifact
        working-directory: terraform
        env:
          ARTIFACT_NAME: tfplan-${{ github.sha }}
        run: |
          ls -la
          tar -czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}.out"
      - name: Upload plan (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan-${{ github.sha }}.tar.gz
          if-no-files-found: error

  terraform-apply:
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::669890779296:role/github-actions-oidc
          aws-region: us-east-1

      - name: Terraform init
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_REGION: ${{ secrets.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=terraform/terraform.tfstate" \
            -backend-config="region=${TF_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Import existing ECR repository into Terraform state (idempotent)
        working-directory: terraform
        env:
          TF_VAR_project_name: "aws-devops-production-ready-infra"
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          REPO_NAME="${TF_VAR_project_name}-app"
          echo "Checking ECR repository ${REPO_NAME}..."
          if aws ecr describe-repositories --repository-names "${REPO_NAME}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "ECR repository exists; importing into Terraform state..."
            terraform import "module.ecr.aws_ecr_repository.this" "${REPO_NAME}" || true
          else
            echo "ECR repository ${REPO_NAME} not found; skipping import."
          fi

      - name: Terraform plan (fresh to avoid stale plan)
        id: apply_plan
        working-directory: terraform
        env:
          TF_VAR_project_name: "aws-devops-production-ready-infra"
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_ecr_image_tag: ${{ needs.terraform-plan.outputs.image_tag }}
          TF_VAR_container_port: 3000
          TF_VAR_alb_listener_port: 80
          TF_VAR_acm_certificate_domain_name: ${{ secrets.ACM_CERT_DOMAIN_NAME }}
        run: |
          PLAN_FILE="tfplan-${GITHUB_SHA}.out"
          echo "Creating fresh plan: ${PLAN_FILE}"
          terraform plan -out="${PLAN_FILE}"
          echo "plan_file=${PLAN_FILE}" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_project_name: "aws-devops-production-ready-infra"
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_ecr_image_tag: ${{ needs.terraform-plan.outputs.image_tag }}
          TF_VAR_container_port: 3000
          TF_VAR_alb_listener_port: 80
          TF_VAR_acm_certificate_domain_name: ${{ secrets.ACM_CERT_DOMAIN_NAME }}
        run: |
          terraform apply -auto-approve "${{ steps.apply_plan.outputs.plan_file }}"
